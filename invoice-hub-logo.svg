<svg xmlns="http://www.w3.org/2000/svg" width="280" height="60" viewBox="0 0 280 60" role="img">
  <title>Invoice Hub Logo</title>
  <desc>Invoice Hub geometric hub logo with hexagon icon and wordmark</desc>

  <!-- Hexagon background -->
  <polygon points="30,4 56,18 56,46 30,60 4,46 4,18" fill="#4F46E5" opacity="0.15"/>
  <!-- Hexagon border -->
  <polygon points="30,4 56,18 56,46 30,60 4,46 4,18" fill="none" stroke="#4F46E5" stroke-width="2"/>

  <!-- Center dot -->
  <circle cx="30" cy="32" r="7" fill="#4F46E5"/>

  <!-- Top node -->
  <circle cx="30" cy="4" r="4" fill="#4F46E5"/>
  <!-- Top-right node -->
  <circle cx="56" cy="18" r="4" fill="#4F46E5"/>
  <!-- Bottom-right node -->
  <circle cx="56" cy="46" r="4" fill="#4F46E5"/>

  <!-- Connector lines -->
  <line x1="30" y1="25" x2="30" y2="8" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="36" y1="28" x2="52" y2="20" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="36" y1="36" x2="52" y2="44" stroke="#4F46E5" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="72" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#111827">Invoice</text>
  <text x="72" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#4F46E5">Hub</text>
</svg>
